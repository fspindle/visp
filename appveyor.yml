# Specify version format
version: "{build}"

os: Visual Studio 2015

# scripts that are called at very beginning, before repo cloning
init:
  - cmd: cmake --version
  - cmd: msbuild /version

install:
  # All external dependencies are installed in C:\projects\deps
  - mkdir C:\projects\deps
  - cd C:\projects\deps

  # Install a recent CMake
  - set CMAKE_URL="https://cmake.org/files/v3.8/cmake-3.8.0-win64-x64.zip"
  - appveyor DownloadFile %CMAKE_URL% -FileName cmake.zip
  - 7z x cmake.zip -o C:\projects\deps > nul
  - move C:\projects\deps\cmake-* C:\projects\deps\cmake # Move to a version-agnostic directory
  - set PATH=C:\projects\deps\cmake\bin;%PATH%
  - cmake --version

# clone directory
clone_folder: C:\projects\visp


build_script:
  - md C:\projects\visp\build
  - cd C:\projects\visp\build
  - cmake -G "Visual Studio 14 2015 Win64" ..
  - cmake --build ..\visp --config Release —-target visp_modules
#  - ctest


